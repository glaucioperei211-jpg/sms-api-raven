<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — SMS Gateway</title>
  <!-- Bootstrap 5 CDN -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    * { box-sizing: border-box; }
    body {
      background: #080808;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-bottom: 40px;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .card {
      border: 1px solid #222;
      border-radius: 18px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.9);
      background: #101010;
      overflow: hidden;
    }
    .card-header {
      background: linear-gradient(135deg, #0f3460 0%, #533483 100%);
      border-radius: 0 !important;
      border-bottom: none;
    }
    .card-body { background: #101010; }
    .form-control {
      background-color: #1a1a1a;
      border: 1px solid #2e2e2e;
      color: #e0e0e0;
      border-radius: 10px;
      padding: 0.55rem 0.85rem;
    }
    .form-control:focus {
      background-color: #212121;
      border-color: #533483;
      color: #fff;
      box-shadow: 0 0 0 0.2rem rgba(83,52,131,0.3);
    }
    .form-control::placeholder { color: #444; }
    .form-label { color: #aaa; font-weight: 500; }
    .form-text { color: #555 !important; }
    .btn-success {
      background: linear-gradient(135deg, #28a745, #1e7e34);
      border: none;
      border-radius: 10px;
    }
    .btn-success:hover { background: linear-gradient(135deg, #1e7e34, #155724); }
    .btn-outline-secondary {
      border-color: #333;
      color: #aaa;
    }
    .btn-outline-secondary:hover { background: #1e1e1e; color: #fff; border-color: #555; }
    .api-key-box {
      font-family: monospace;
      font-size: 0.78rem;
      word-break: break-all;
      background: #1a1a1a;
      border: 1px dashed #333;
      border-radius: 8px;
      padding: 10px;
      color: #7ec8e3;
    }
    .spinner-border { display: none; }
    hr { border-color: #222; }
    .text-muted { color: #555 !important; }
    a { color: #7a5cc9; }
    a:hover { color: #a07ae3; }
    .alert { border-radius: 10px; font-size: 0.88rem; }
    .alert-danger  { background: #2a0808; border-color: #5a1515; color: #ff9999; }
    .alert-success { background: #082a08; border-color: #155a15; color: #99ff99; }
    .credits-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #050505;
      border-top: 1px solid #181818;
      text-align: center;
      padding: 7px 16px;
      color: #333;
      font-size: 0.7rem;
      letter-spacing: 0.04em;
      z-index: 999;
    }
    .credits-bar strong { color: #555; }
  </style>
</head>
<body>
  <div class="container" style="max-width: 480px;">
    <div class="card">

      <!-- Header -->
      <div class="card-header text-center py-4">
        <h4 class="text-white mb-1">📡 SMS Gateway</h4>
        <small class="text-white-50">Register a New Group Account</small>
      </div>

      <!-- Body -->
      <div class="card-body p-4">

        <!-- Alert box -->
        <div id="alertBox" class="alert d-none" role="alert"></div>

        <!-- Success panel (shows after registration) -->
        <div id="successPanel" class="d-none">
          <div class="alert alert-success">
            <strong>Registration Successful!</strong><br />
            Your API key has been generated. Copy it now — it won't be shown again.
          </div>
          <label class="form-label fw-semibold">Your API Key:</label>
          <div class="api-key-box mb-3" id="apiKeyDisplay">—</div>
          <button class="btn btn-outline-secondary btn-sm mb-3 w-100" onclick="copyApiKey()">
            📋 Copy API Key
          </button>
          <a href="login.html" class="btn btn-success w-100">Proceed to Login</a>
        </div>

        <!-- Registration form -->
        <form id="registerForm" novalidate>
          <div class="mb-3">
            <label for="group_name" class="form-label fw-semibold">Group Name</label>
            <input
              type="text"
              class="form-control"
              id="group_name"
              placeholder="e.g. IT Department"
              required
            />
            <div class="form-text">This name will be prepended to every SMS you send.</div>
          </div>

          <div class="mb-3">
            <label for="email" class="form-label fw-semibold">Email Address</label>
            <input
              type="email"
              class="form-control"
              id="email"
              placeholder="group@example.com"
              required
              autocomplete="email"
            />
          </div>

          <div class="mb-3">
            <label for="password" class="form-label fw-semibold">Password</label>
            <input
              type="password"
              class="form-control"
              id="password"
              placeholder="Minimum 6 characters"
              required
              autocomplete="new-password"
            />
          </div>

          <div class="mb-4">
            <label for="confirm_password" class="form-label fw-semibold">Confirm Password</label>
            <input
              type="password"
              class="form-control"
              id="confirm_password"
              placeholder="Repeat your password"
              required
              autocomplete="new-password"
            />
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-success btn-lg" id="registerBtn">
              <span class="spinner-border spinner-border-sm me-2" id="spinner"></span>
              Create Account
            </button>
          </div>
        </form>

        <hr class="my-4" />

        <p class="text-center mb-0 text-muted">
          Already have an account?
          <a href="login.html" class="text-decoration-none fw-semibold">Login here</a>
        </p>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const form = document.getElementById('registerForm');
    const alertBox = document.getElementById('alertBox');
    const spinner = document.getElementById('spinner');
    const registerBtn = document.getElementById('registerBtn');
    const successPanel = document.getElementById('successPanel');
    let generatedApiKey = '';

    function showAlert(message, type = 'danger') {
      alertBox.className = `alert alert-${type}`;
      alertBox.textContent = message;
      alertBox.classList.remove('d-none');
    }

    function setLoading(loading) {
      registerBtn.disabled = loading;
      spinner.style.display = loading ? 'inline-block' : 'none';
    }

    function copyApiKey() {
      navigator.clipboard.writeText(generatedApiKey).then(() => {
        alert('API Key copied to clipboard!');
      });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.classList.add('d-none');

      const group_name = document.getElementById('group_name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm_password = document.getElementById('confirm_password').value;

      if (!group_name || !email || !password || !confirm_password) {
        showAlert('Please fill in all fields.');
        return;
      }

      if (password.length < 6) {
        showAlert('Password must be at least 6 characters.');
        return;
      }

      if (password !== confirm_password) {
        showAlert('Passwords do not match.');
        return;
      }

      setLoading(true);

      try {
        const response = await fetch('/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ group_name, email, password }),
        });

        const data = await response.json();

        if (!response.ok) {
          showAlert(data.error || 'Registration failed.');
          setLoading(false);
          return;
        }

        // Show success panel with API key
        generatedApiKey = data.api_key;
        document.getElementById('apiKeyDisplay').textContent = generatedApiKey;
        form.classList.add('d-none');
        successPanel.classList.remove('d-none');
        alertBox.classList.add('d-none');

      } catch (err) {
        showAlert('Network error. Is the server running?');
        setLoading(false);
      }
    });
  </script>

  <div class="credits-bar">Created by <strong>Raven John Climaco</strong> &mdash; SMS Gateway &copy; 2025</div>
</body>
</html>
