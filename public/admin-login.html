<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — SMS Gateway</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      background: #080808;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .card {
      border: 1px solid #222;
      border-radius: 18px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.95);
      background: #101010;
      overflow: hidden;
    }
    .card-header {
      background: linear-gradient(135deg, #ff6b00, #cc4400);
      border-radius: 0 !important;
      border-bottom: none;
    }
    .card-body { background: #101010; }
    .form-control {
      background-color: #1a1a1a;
      border: 1px solid #2e2e2e;
      color: #e0e0e0;
      border-radius: 10px;
      padding: 0.55rem 0.85rem;
    }
    .form-control:focus {
      background-color: #212121;
      border-color: #ff6b00;
      color: #fff;
      box-shadow: 0 0 0 0.2rem rgba(255,107,0,0.25);
    }
    .form-control::placeholder { color: #444; }
    .form-label { color: #aaa; font-weight: 500; }
    .btn-warning {
      background: linear-gradient(135deg, #ff6b00, #e55a00);
      border: none;
      color: #fff;
      font-weight: 600;
      border-radius: 10px;
    }
    .btn-warning:hover { background: linear-gradient(135deg, #e55a00, #c44d00); color: #fff; }
    .admin-badge {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 3px 12px;
      font-size: 0.72rem;
      color: #ffddbb;
      letter-spacing: 0.12em;
    }
    .spinner-border { display: none; }
    hr { border-color: #222; }
    .text-muted { color: #555 !important; }
    a { color: #ff6b00; }
    a:hover { color: #ff9a55; }
    .alert { border-radius: 10px; font-size: 0.88rem; }
    .alert-danger  { background: #2a0808; border-color: #5a1515; color: #ff9999; }
    .alert-success { background: #082a08; border-color: #155a15; color: #99ff99; }
    .credits-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #050505;
      border-top: 1px solid #181818;
      text-align: center;
      padding: 7px 16px;
      color: #333;
      font-size: 0.7rem;
      letter-spacing: 0.04em;
      z-index: 999;
    }
    .credits-bar strong { color: #555; }
  </style>
</head>
<body>
  <div class="container" style="max-width: 420px;">
    <div class="card">
      <div class="card-header text-center py-4">
        <h4 class="text-white mb-1">⚙️ SMS Gateway</h4>
        <span class="admin-badge">ADMINISTRATOR ACCESS</span>
      </div>

      <div class="card-body p-4">
        <div id="alertBox" class="alert d-none" role="alert"></div>

        <form id="adminLoginForm" novalidate>
          <div class="mb-3">
            <label class="form-label fw-semibold">Admin Username</label>
            <input type="text" class="form-control" id="username" placeholder="admin" required autocomplete="username" />
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Admin Password</label>
            <input type="password" class="form-control" id="password" placeholder="Password" required autocomplete="current-password" />
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-warning btn-lg" id="loginBtn">
              <span class="spinner-border spinner-border-sm me-2" id="spinner"></span>
              Login as Admin
            </button>
          </div>
        </form>

        <hr class="my-3" />
        <p class="text-center mb-0 text-muted small">
          <a href="/login.html" class="text-decoration-none">← Back to Group Login</a>
        </p>
      </div>
    </div>
  </div>

  <div class="credits-bar">Created by <strong>Raven John Climaco</strong> &mdash; SMS Gateway &copy; 2025</div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const form     = document.getElementById('adminLoginForm');
    const alertBox = document.getElementById('alertBox');
    const spinner  = document.getElementById('spinner');
    const loginBtn = document.getElementById('loginBtn');

    function showAlert(msg, type = 'danger') {
      alertBox.className = `alert alert-${type}`;
      alertBox.textContent = msg;
      alertBox.classList.remove('d-none');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.classList.add('d-none');

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) { showAlert('Fill in all fields.'); return; }

      loginBtn.disabled = true;
      spinner.style.display = 'inline-block';

      try {
        const res = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();

        if (!res.ok) { showAlert(data.error || 'Login failed.'); loginBtn.disabled = false; spinner.style.display = 'none'; return; }

        localStorage.setItem('admin_token', data.token);
        document.cookie = `admin_token=${data.token}; path=/; max-age=${8 * 3600}`;
        showAlert('Login successful! Redirecting...', 'success');
        setTimeout(() => { window.location.href = '/admin-dashboard.html'; }, 700);

      } catch (err) {
        showAlert('Network error. Is the server running?');
        loginBtn.disabled = false;
        spinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
