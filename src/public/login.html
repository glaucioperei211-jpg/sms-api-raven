<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — SMS Gateway</title>
  <!-- Bootstrap 5 CDN -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    * { box-sizing: border-box; }
    body {
      background: #080808;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .card {
      border: 1px solid #222;
      border-radius: 18px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.9);
      background: #101010;
      overflow: hidden;
    }
    .card-header {
      background: linear-gradient(135deg, #e94560 0%, #0f3460 100%);
      border-radius: 0 !important;
      border-bottom: none;
    }
    .card-body { background: #101010; }
    .form-control {
      background-color: #1a1a1a;
      border: 1px solid #2e2e2e;
      color: #e0e0e0;
      border-radius: 10px;
      padding: 0.55rem 0.85rem;
    }
    .form-control:focus {
      background-color: #212121;
      border-color: #e94560;
      color: #fff;
      box-shadow: 0 0 0 0.2rem rgba(233,69,96,0.2);
    }
    .form-control::placeholder { color: #444; }
    .form-label { color: #aaa; font-weight: 500; }
    .btn-primary {
      background: linear-gradient(135deg, #e94560, #c62a47);
      border: none;
      border-radius: 10px;
      letter-spacing: 0.03em;
    }
    .btn-primary:hover { background: linear-gradient(135deg, #c62a47, #a81f38); }
    .spinner-border { display: none; }
    hr { border-color: #222; }
    .text-muted { color: #555 !important; }
    a { color: #e94560; }
    a:hover { color: #ff7a9a; }
    .alert { border-radius: 10px; font-size: 0.88rem; }
    .alert-danger  { background: #2a0808; border-color: #5a1515; color: #ff9999; }
    .alert-success { background: #082a08; border-color: #155a15; color: #99ff99; }
    .credits-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #050505;
      border-top: 1px solid #181818;
      text-align: center;
      padding: 7px 16px;
      color: #333;
      font-size: 0.7rem;
      letter-spacing: 0.04em;
      z-index: 999;
    }
    .credits-bar strong { color: #555; }
  </style>
</head>
<body>
  <div class="container" style="max-width: 440px;">
    <div class="card">

      <!-- Header -->
      <div class="card-header text-center py-4">
        <h4 class="text-white mb-1">📡 SMS Gateway</h4>
        <small class="text-white-50">Capstone Project — Group Login</small>
      </div>

      <!-- Body -->
      <div class="card-body p-4">

        <!-- Alert box -->
        <div id="alertBox" class="alert d-none" role="alert"></div>

        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label for="email" class="form-label fw-semibold">Email Address</label>
            <input
              type="email"
              class="form-control"
              id="email"
              placeholder="group@example.com"
              required
              autocomplete="email"
            />
          </div>

          <div class="mb-4">
            <label for="password" class="form-label fw-semibold">Password</label>
            <input
              type="password"
              class="form-control"
              id="password"
              placeholder="Enter your password"
              required
              autocomplete="current-password"
            />
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg" id="loginBtn">
              <span class="spinner-border spinner-border-sm me-2" id="spinner"></span>
              Login
            </button>
          </div>
        </form>

        <hr class="my-4" />

        <p class="text-center mb-0 text-muted">
          Don't have an account?
          <a href="register.html" class="text-decoration-none fw-semibold">Register here</a>
        </p>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const form = document.getElementById('loginForm');
    const alertBox = document.getElementById('alertBox');
    const spinner = document.getElementById('spinner');
    const loginBtn = document.getElementById('loginBtn');

    function showAlert(message, type = 'danger') {
      alertBox.className = `alert alert-${type}`;
      alertBox.textContent = message;
      alertBox.classList.remove('d-none');
    }

    function setLoading(loading) {
      loginBtn.disabled = loading;
      spinner.style.display = loading ? 'inline-block' : 'none';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.classList.add('d-none');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showAlert('Please fill in all fields.');
        return;
      }

      setLoading(true);

      try {
        const response = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();

        if (!response.ok) {
          showAlert(data.error || 'Login failed.');
          setLoading(false);
          return;
        }

        // Store token in cookie (HttpOnly not needed here since JS dashboard uses it)
        document.cookie = `token=${data.token}; path=/; max-age=${8 * 3600}`;

        // Also store in localStorage for dashboard JS use
        localStorage.setItem('token', data.token);
        localStorage.setItem('group', JSON.stringify(data.group));

        showAlert('Login successful! Redirecting...', 'success');

        setTimeout(() => {
          window.location.href = '/dashboard.html';
        }, 800);

      } catch (err) {
        showAlert('Network error. Is the server running?');
        setLoading(false);
      }
    });
  </script>

  <div class="credits-bar">Created by <strong>Raven John Climaco</strong> &mdash; SMS Gateway &copy; 2025</div>
</body>
</html>
