<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Device Management - SMS Gateway</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('data:image/svg+xml,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse"><path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/></pattern></defs><rect width="100" height="100" fill="url(%23grid)"/></svg>');
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 20px;
      margin-bottom: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.18);
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: slideDown 0.5s ease-out;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header-content {
      flex: 1;
    }

    .header h1 {
      color: #667eea;
      font-size: 32px;
      margin-bottom: 8px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header p {
      color: #666;
      font-size: 15px;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 35px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.18);
      margin-bottom: 30px;
      animation: fadeIn 0.6s ease-out;
      animation-fill-mode: both;
    }

    .card:nth-child(2) {
      animation-delay: 0.1s;
    }

    .card:nth-child(3) {
      animation-delay: 0.2s;
    }

    .card h2 {
      color: #333;
      margin-bottom: 25px;
      font-size: 24px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 15px;
      border-bottom: 3px solid transparent;
      background: linear-gradient(to right, #667eea 0%, #764ba2 100%) left bottom no-repeat;
      background-size: 100px 3px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      margin-bottom: 10px;
      color: #333;
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 15px;
      transition: all 0.3s ease;
      background: #fafafa;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #667eea;
      background: white;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .form-group .help-text {
      font-size: 13px;
      color: #888;
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: #f8f9ff;
      border-radius: 10px;
      border: 2px solid #e8eaff;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .checkbox-group:hover {
      background: #f0f3ff;
      border-color: #667eea;
    }

    .checkbox-group input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #667eea;
    }

    .btn {
      padding: 14px 32px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .btn:active::before {
      width: 300px;
      height: 300px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 25px rgba(102, 126, 234, 0.5);
    }

    .btn-primary:active {
      transform: translateY(-1px);
    }

    .btn-danger {
      background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
    }

    .btn-danger:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 25px rgba(231, 76, 60, 0.5);
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
      box-shadow: 0 4px 15px rgba(108, 117, 125, 0.3);
    }

    .btn-secondary:hover {
      background: #5a6268;
      transform: translateY(-3px);
      box-shadow: 0 6px 25px rgba(108, 117, 125, 0.4);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid #667eea;
      color: #667eea;
      box-shadow: none;
    }

    .btn-outline:hover {
      background: #667eea;
      color: white;
      transform: translateY(-3px);
      box-shadow: 0 6px 25px rgba(102, 126, 234, 0.3);
    }

    .form-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .devices-list {
      margin-top: 20px;
    }

    .device-card {
      background: linear-gradient(135deg, #ffffff 0%, #f8f9ff 100%);
      border: 2px solid #e8eaff;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      position: relative;
      transition: all 0.3s ease;
      animation: fadeIn 0.4s ease-out;
      animation-fill-mode: both;
    }

    .device-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 40px rgba(102, 126, 234, 0.15);
    }

    .device-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 5px;
      border-radius: 16px 0 0 16px;
      background: linear-gradient(to bottom, #667eea, #764ba2);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .device-card:hover::before {
      opacity: 1;
    }

    .device-card.primary {
      border-color: #667eea;
      background: linear-gradient(135deg, #f0f3ff 0%, #e8eaff 100%);
      box-shadow: 0 4px 20px rgba(102, 126, 234, 0.2);
    }

    .device-card.primary::before {
      opacity: 1;
    }

    .device-card.offline {
      opacity: 0.6;
      background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
      border-color: #d0d0d0;
    }

    .device-card.offline::before {
      background: #95a5a6;
    }

    .device-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
      gap: 15px;
    }

    .device-title-section {
      flex: 1;
    }

    .device-name {
      font-weight: 700;
      font-size: 20px;
      color: #333;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .device-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 25px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .status-online {
      background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
      color: white;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 2px 8px rgba(46, 204, 113, 0.3);
      }
      50% {
        box-shadow: 0 2px 20px rgba(46, 204, 113, 0.6);
      }
    }

    .status-offline {
      background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%);
      color: white;
    }

    .device-info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin: 16px 0;
      padding: 16px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 12px;
    }

    .device-info {
      font-size: 14px;
      color: #555;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .device-info strong {
      color: #333;
      font-weight: 600;
    }

    .device-info-icon {
      color: #667eea;
      font-weight: bold;
    }

    .device-actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding-top: 16px;
      border-top: 2px solid rgba(102, 126, 234, 0.1);
    }

    .device-actions button {
      font-size: 13px;
      padding: 10px 20px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .badge-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .badge-inactive {
      background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
      color: white;
    }

    .message {
      padding: 16px 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideDown 0.3s ease-out;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .message::before {
      font-size: 24px;
    }

    .message.success {
      background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
      color: #155724;
      border-left: 4px solid #28a745;
    }

    .message.success::before {
      content: '✓';
    }

    .message.error {
      background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
      color: #721c24;
      border-left: 4px solid #dc3545;
    }

    .message.error::before {
      content: '✕';
    }

    .loading {
      text-align: center;
      padding: 60px;
      color: #667eea;
      font-size: 16px;
    }

    .loading::after {
      content: '';
      display: block;
      margin: 20px auto;
      width: 40px;
      height: 40px;
      border: 4px solid #e8eaff;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }

    .empty-state::before {
      content: '📱';
      display: block;
      font-size: 72px;
      margin-bottom: 20px;
      opacity: 0.3;
    }

    .empty-state h3 {
      margin-bottom: 12px;
      font-size: 22px;
      color: #333;
    }

    .empty-state p {
      font-size: 16px;
      color: #666;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      text-align: center;
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
    }

    .stat-icon {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: #667eea;
      margin-bottom: 5px;
    }

    .stat-label {
      font-size: 14px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 20px;
      }

      .header h1 {
        font-size: 24px;
      }

      .header-actions {
        width: 100%;
        justify-content: stretch;
      }

      .header-actions button {
        flex: 1;
      }

      .device-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .device-info-grid {
        grid-template-columns: 1fr;
      }

      .form-actions {
        flex-direction: column;
      }

      .form-actions button {
        width: 100%;
      }

      .device-actions {
        flex-direction: column;
      }

      .device-actions button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-content">
        <h1>📱 Device Management</h1>
        <p>Manage your Android devices for SMS Gateway system</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-outline" onclick="goToDashboard()">← Dashboard</button>
        <button class="btn btn-secondary" onclick="logout()">Logout</button>
      </div>
    </div>

    <div id="messageBox"></div>

    <!-- Stats Section -->
    <div id="statsSection" class="stats-grid" style="display: none;"></div>

    <!-- Register New Device -->
    <div class="card">
      <h2>➕ Register New Device</h2>
      <form id="registerForm" onsubmit="registerDevice(event)">
        <div class="form-group">
          <label for="deviceToken">🔑 Device Token *</label>
          <input type="text" id="deviceToken" required placeholder="Enter unique device token (e.g., UUID)">
          <div class="help-text">💡 Use a unique identifier like UUID. This will be used in your Android app.</div>
        </div>

        <div class="form-group">
          <label for="deviceName">📝 Device Name *</label>
          <input type="text" id="deviceName" required placeholder="e.g., My Android Phone">
        </div>

        <div class="form-group">
          <label for="deviceModel">📱 Device Model</label>
          <input type="text" id="deviceModel" placeholder="e.g., Samsung Galaxy S23">
        </div>

        <div class="form-group">
          <div class="checkbox-group">
            <input type="checkbox" id="isPrimary">
            <label for="isPrimary" style="margin: 0;">⭐ Set as primary device</label>
          </div>
          <div class="help-text">💡 Primary device receives SMS first. Unchecking will use first available device.</div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">✓ Register Device</button>
          <button type="button" class="btn btn-outline" onclick="generateToken()">🎲 Generate Random Token</button>
        </div>
      </form>
    </div>

    <!-- Registered Devices -->
    <div class="card">
      <h2>📋 Your Registered Devices</h2>
      <div id="devicesList" class="devices-list">
        <div class="loading">Loading devices...</div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    let token = localStorage.getItem('token');

    // Check if logged in
    if (!token) {
      window.location.href = '/login.html';
    }

    // Generate random UUID-like token
    function generateToken() {
      const token = 'device-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
      document.getElementById('deviceToken').value = token;
    }

    // Show message
    function showMessage(message, type = 'success') {
      const messageBox = document.getElementById('messageBox');
      messageBox.innerHTML = `<div class="message ${type}">${message}</div>`;
      setTimeout(() => {
        messageBox.innerHTML = '';
      }, 5000);
    }

    // Register device
    async function registerDevice(event) {
      event.preventDefault();

      const deviceToken = document.getElementById('deviceToken').value;
      const deviceName = document.getElementById('deviceName').value;
      const deviceModel = document.getElementById('deviceModel').value;
      const isPrimary = document.getElementById('isPrimary').checked;

      try {
        const response = await fetch(`${API_BASE}/api/register-device`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            device_token: deviceToken,
            device_name: deviceName,
            device_model: deviceModel || 'Unknown Model',
            is_primary: isPrimary,
          }),
        });

        const data = await response.json();

        if (response.ok) {
          showMessage('Device registered successfully!', 'success');
          document.getElementById('registerForm').reset();
          loadDevices();
        } else {
          showMessage(data.error || 'Failed to register device', 'error');
        }
      } catch (error) {
        showMessage('Network error: ' + error.message, 'error');
      }
    }

    // Load devices
    async function loadDevices() {
      const devicesList = document.getElementById('devicesList');

      try {
        const response = await fetch(`${API_BASE}/api/devices`, {
          headers: {
            'Authorization': `Bearer ${token}`,
          },
        });

        const data = await response.json();

        if (!response.ok) {
          devicesList.innerHTML = `<div class="error">${data.error}</div>`;
          return;
        }

        // Update stats
        updateStats(data.devices);

        if (data.devices.length === 0) {
          devicesList.innerHTML = `
            <div class="empty-state">
              <h3>No devices registered yet</h3>
              <p>Register your first Android device above to start sending SMS.</p>
            </div>
          `;
          return;
        }

        devicesList.innerHTML = data.devices.map((device, index) => `
          <div class="device-card ${device.is_primary ? 'primary' : ''} ${device.is_online ? '' : 'offline'}" style="animation-delay: ${index * 0.1}s;">
            <div class="device-header">
              <div class="device-title-section">
                <div class="device-name">
                  📱 ${device.device_name}
                  ${device.is_primary ? '<span class="badge badge-primary">⭐ PRIMARY</span>' : ''}
                  ${!device.is_active ? '<span class="badge badge-inactive">🚫 INACTIVE</span>' : ''}
                </div>
              </div>
              <span class="device-status ${device.is_online ? 'status-online' : 'status-offline'}">
                ${device.is_online ? '● Online' : '○ Offline'}
              </span>
            </div>
            
            <div class="device-info-grid">
              <div class="device-info">
                <span class="device-info-icon">📱</span>
                <strong>Model:</strong> ${device.device_model}
              </div>
              <div class="device-info">
                <span class="device-info-icon">🔑</span>
                <strong>Token:</strong> <code style="font-size: 12px; background: rgba(102, 126, 234, 0.1); padding: 2px 6px; border-radius: 4px;">${device.device_token}</code>
              </div>
              <div class="device-info">
                <span class="device-info-icon">🕐</span>
                <strong>Last Seen:</strong> ${device.last_seen ? new Date(device.last_seen).toLocaleString() : 'Never'}
              </div>
              <div class="device-info">
                <span class="device-info-icon">📅</span>
                <strong>Registered:</strong> ${new Date(device.registered_at).toLocaleString()}
              </div>
            </div>
            
            <div class="device-actions">
              ${!device.is_primary ? `<button class="btn btn-primary" onclick="setPrimary(${device.id})">⭐ Set as Primary</button>` : ''}
              ${device.is_active ? 
                `<button class="btn btn-secondary" onclick="toggleActive(${device.id}, false)">🚫 Deactivate</button>` :
                `<button class="btn btn-primary" onclick="toggleActive(${device.id}, true)">✓ Activate</button>`
              }
              <button class="btn btn-danger" onclick="deleteDevice(${device.id}, '${device.device_name}')">🗑 Delete</button>
            </div>
          </div>
        `).join('');
      } catch (error) {
        devicesList.innerHTML = `<div class="error">Failed to load devices: ${error.message}</div>`;
      }
    }

    // Update stats section
    function updateStats(devices) {
      const statsSection = document.getElementById('statsSection');
      const totalDevices = devices.length;
      const onlineDevices = devices.filter(d => d.is_online).length;
      const activeDevices = devices.filter(d => d.is_active).length;
      const primaryDevice = devices.find(d => d.is_primary);

      if (totalDevices > 0) {
        statsSection.style.display = 'grid';
        statsSection.innerHTML = `
          <div class="stat-card" style="animation-delay: 0.3s;">
            <div class="stat-icon">📱</div>
            <div class="stat-value">${totalDevices}</div>
            <div class="stat-label">Total Devices</div>
          </div>
          <div class="stat-card" style="animation-delay: 0.35s;">
            <div class="stat-icon">🟢</div>
            <div class="stat-value">${onlineDevices}</div>
            <div class="stat-label">Online Now</div>
          </div>
          <div class="stat-card" style="animation-delay: 0.4s;">
            <div class="stat-icon">✓</div>
            <div class="stat-value">${activeDevices}</div>
            <div class="stat-label">Active Devices</div>
          </div>
          <div class="stat-card" style="animation-delay: 0.45s;">
            <div class="stat-icon">⭐</div>
            <div class="stat-value">${primaryDevice ? '1' : '0'}</div>
            <div class="stat-label">Primary Device</div>
          </div>
        `;
      } else {
        statsSection.style.display = 'none';
      }
    }

    // Go to dashboard
    function goToDashboard() {
      window.location.href = '/dashboard.html';
    }

    // Set device as primary
    async function setPrimary(deviceId) {
      try {
        const response = await fetch(`${API_BASE}/api/devices/${deviceId}`, {
          method: 'PUT',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ is_primary: true }),
        });

        const data = await response.json();

        if (response.ok) {
          showMessage('Primary device updated!', 'success');
          loadDevices();
        } else {
          showMessage(data.error || 'Failed to update device', 'error');
        }
      } catch (error) {
        showMessage('Network error: ' + error.message, 'error');
      }
    }

    // Toggle device active status
    async function toggleActive(deviceId, isActive) {
      try {
        const response = await fetch(`${API_BASE}/api/devices/${deviceId}`, {
          method: 'PUT',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ is_active: isActive }),
        });

        const data = await response.json();

        if (response.ok) {
          showMessage(`Device ${isActive ? 'activated' : 'deactivated'}!`, 'success');
          loadDevices();
        } else {
          showMessage(data.error || 'Failed to update device', 'error');
        }
      } catch (error) {
        showMessage('Network error: ' + error.message, 'error');
      }
    }

    // Delete device
    async function deleteDevice(deviceId, deviceName) {
      if (!confirm(`Are you sure you want to delete "${deviceName}"? This action cannot be undone.`)) {
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/api/devices/${deviceId}`, {
          method: 'DELETE',
          headers: {
            'Authorization': `Bearer ${token}`,
          },
        });

        const data = await response.json();

        if (response.ok) {
          showMessage('Device deleted successfully!', 'success');
          loadDevices();
        } else {
          showMessage(data.error || 'Failed to delete device', 'error');
        }
      } catch (error) {
        showMessage('Network error: ' + error.message, 'error');
      }
    }

    // Logout
    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('group');
      window.location.href = '/login.html';
    }

    // Load devices on page load
    loadDevices();
  </script>
</body>
</html>
